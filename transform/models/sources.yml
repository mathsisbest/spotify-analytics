version: 2

sources:
  - name: marts
    database: "{{ env_var('BQ_PROJECT', env_var('BQ_PROJECT_DEV', 'spotify-analytics')) }}"
    schema: "{{ env_var('MARTS_DATASET', 'marts') }}"
    description: "ML training outputs written to the marts layer."

    tables:
      - name: ml_cluster_assignments
        description: >
          K-means cluster assignments for tracks based on audio features.
          One row per track_id per training run.
        columns:
          - name: track_id
            description: "Spotify track ID."
          - name: cluster_id
            description: "Assigned cluster label (0-based)."
          - name: danceability
            description: "Danceability score (0.0–1.0) used as a clustering feature."
          - name: energy
            description: "Energy score (0.0–1.0) used as a clustering feature."
          - name: valence
            description: "Valence score (0.0–1.0) used as a clustering feature."
          - name: tempo
            description: "Tempo in BPM used as a clustering feature."
          - name: loudness
            description: "Loudness in dB used as a clustering feature."
          - name: speechiness
            description: "Speechiness score (0.0–1.0) used as a clustering feature."
          - name: acousticness
            description: "Acousticness score (0.0–1.0) used as a clustering feature."
          - name: instrumentalness
            description: "Instrumentalness score (0.0–1.0) used as a clustering feature."
          - name: liveness
            description: "Liveness score (0.0–1.0) used as a clustering feature."
          - name: key
            description: "Musical key (0–11) used as a clustering feature."
          - name: mode
            description: "Modality — major (1) or minor (0) used as a clustering feature."
          - name: time_signature
            description: "Time signature (3–7) used as a clustering feature."
          - name: duration_ms
            description: "Track duration in milliseconds."
          - name: run_id
            description: "UUID for the ML training run."
          - name: trained_at
            description: "Timestamp when the model was trained."

      - name: ml_model_metrics
        description: >
          Evaluation metrics from ML training runs. One row per metric
          per model type per training run.
        columns:
          - name: model_type
            description: "Model category: cluster, predict, or forecast."
          - name: metric_name
            description: "Metric identifier (e.g. silhouette_score, inertia, mae)."
          - name: metric_value
            description: "Numeric value of the metric."
          - name: run_id
            description: "UUID for the ML training run."
          - name: trained_at
            description: "Timestamp when the model was trained."

      - name: ml_forecast
        description: >
          Time-series forecast of listening minutes.
          One row per forecast date per training run with prediction intervals.
        columns:
          - name: forecast_date
            description: "Predicted calendar date."
          - name: predicted_minutes
            description: "Forecasted minutes listened."
          - name: lower_bound
            description: "Lower bound of the prediction interval."
          - name: upper_bound
            description: "Upper bound of the prediction interval."
          - name: run_id
            description: "UUID for the ML training run."
          - name: trained_at
            description: "Timestamp when the model was trained."
  - name: raw
    database: "{{ env_var('BQ_PROJECT', env_var('BQ_PROJECT_DEV', 'spotify-analytics')) }}"
    schema: "{{ env_var('RAW_DATASET', 'raw') }}"
    description: "Raw ingestion layer — landing zone for Spotify API data."

    tables:
      - name: streaming_history
        description: >
          Raw recently-played tracks polled from the Spotify Web API every 2 minutes.
          Deduplication is handled at the staging layer.
        columns:
          - name: track_id
            description: "Spotify track ID (unique per track)."
          - name: track_name
            description: "Track title."
          - name: artist_id
            description: "Spotify artist ID (primary)."
          - name: artist_name
            description: "Artist name (primary)."
          - name: artist_ids
            description: "All Spotify artist IDs for multi-artist tracks."
          - name: artist_names
            description: "All artist names for multi-artist tracks."
          - name: album_name
            description: "Album name."
          - name: album_id
            description: "Spotify album ID."
          - name: played_at
            description: "ISO-8601 timestamp of when playback ended."
          - name: context
            description: "Playback context (e.g. playlist, album, artist)."
          - name: duration_ms
            description: "Track duration in milliseconds."
          - name: loaded_at
            description: "Row ingestion timestamp (server-side)."
        freshness:
          warn_after:
            count: 6
            period: hour
          error_after:
            count: 24
            period: hour
        loaded_at_field: loaded_at

      - name: track_features
        description: >
          Audio features for tracks, fetched via the Spotify Audio Features API.
          One row per track_id, upserted when new tracks are discovered.
        columns:
          - name: track_id
            description: "Spotify track ID."
          - name: danceability
            description: "How suitable a track is for dancing (0.0–1.0)."
          - name: energy
            description: "Perceptual intensity and activity (0.0–1.0)."
          - name: key
            description: "Estimated key (0=C, 1=C#/Db, …, 11=B)."
          - name: loudness
            description: "Overall loudness in decibels (dB)."
          - name: mode
            description: "Modality — major (1) or minor (0)."
          - name: speechiness
            description: "Presence of spoken words (0.0–1.0)."
          - name: acousticness
            description: "Confidence the track is acoustic (0.0–1.0)."
          - name: instrumentalness
            description: "Vocal presence — values >0.5 are instrumental (0.0–1.0)."
          - name: liveness
            description: "Presence of a live audience (0.0–1.0)."
          - name: valence
            description: "Musical positiveness (0.0–1.0)."
          - name: tempo
            description: "Estimated tempo in BPM."
          - name: time_signature
            description: "Estimated time signature (3–7)."
          - name: duration_ms
            description: "Track duration in milliseconds."
          - name: fetched_at
            description: "Timestamp when the feature row was fetched."

      - name: ingestion_runs
        description: >
          Audit table recording every Cloud Function invocation.
          One row per poll cycle.
        columns:
          - name: run_id
            description: "UUID for the run."
          - name: started_at
            description: "Run start timestamp."
          - name: finished_at
            description: "Run completion timestamp."
          - name: status
            description: "success or error."
          - name: rows_ingested
            description: "Number of new rows written."
          - name: rows_enriched
            description: "Number of tracks enriched with audio features."
          - name: error_message
            description: "Error detail if status = error."
          - name: duration_seconds
            description: "Run duration in seconds."
        freshness:
          warn_after:
            count: 12
            period: hour
          error_after:
            count: 24
            period: hour
        loaded_at_field: started_at
