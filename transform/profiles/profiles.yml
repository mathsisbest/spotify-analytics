spotify_analytics:
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID', 'spotify-analytics-76dd657e') }}"
      dataset: marts
      threads: 4
      location: us-central1
      priority: interactive
      job_creation_timeout_seconds: 300
      job_execution_timeout_seconds: 600
      retries: 1

    ci:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID', 'spotify-analytics-76dd657e') }}"
      dataset: marts
      threads: 2
      location: us-central1
      priority: interactive
      job_creation_timeout_seconds: 300
      job_execution_timeout_seconds: 600
      retries: 0

    prod:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID', 'spotify-analytics-76dd657e') }}"
      dataset: marts
      threads: 8
      location: us-central1
      priority: interactive
      job_creation_timeout_seconds: 300
      job_execution_timeout_seconds: 3600
      retries: 2

  target: dev
