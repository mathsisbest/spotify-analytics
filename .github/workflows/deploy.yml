name: Deploy
on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY_REPO: spotify-analytics
  DASHBOARD_IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/spotify-analytics/dashboard
  DASHBOARD_SERVICE: spotify-dashboard

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6"
      - run: terraform init
        working-directory: terraform/
      - run: terraform apply -auto-approve
        working-directory: terraform/

  dashboard-deploy:
    runs-on: ubuntu-latest
    needs: [terraform]
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
      - name: Build and push dashboard image
        run: |
          docker build -f dashboard/Dockerfile \
            -t ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }} \
            -t ${{ env.DASHBOARD_IMAGE }}:latest \
            dashboard/
          docker push ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DASHBOARD_IMAGE }}:latest
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.DASHBOARD_SERVICE }} \
            --image ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --project ${{ env.GCP_PROJECT_ID }}
